name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build unsigned IPA
        run: |
          xcodebuild clean -project PixelMask.xcodeproj -scheme PixelMask

          # 编译并归档（禁用签名，TrollStore 可直接安装）
          xcodebuild archive \
            -project PixelMask.xcodeproj \
            -scheme PixelMask \
            -archivePath ./build/PixelMask.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

          mkdir -p Payload
          cp -R ./build/PixelMask.xcarchive/Products/Applications/PixelMask.app Payload/
          zip -r PixelMask-unsigned.ipa Payload
          rm -rf Payload

          ls -lh PixelMask-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelMask-unsigned-ipa
          path: PixelMask-unsigned.ipa
          retention-days: 30
